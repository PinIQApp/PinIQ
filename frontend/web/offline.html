<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#050B14">
  <title>Pin IQ Offline</title>
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #050b14;
      color: #f8fafc;
      font-family: Roboto, Arial, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(560px, 100%);
      padding: 28px;
      background: #121d2e;
      border: 1px solid #142033;
      border-radius: 24px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.08;
    }

    p {
      margin: 0 0 20px;
      color: #94a3b8;
      font-size: 16px;
      line-height: 1.45;
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 14px 18px;
      background: #d62828;
      color: white;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main>
    <h1>Pin IQ is offline</h1>
    <p>Reconnect to load team messages, nutrition plans, recruiting tools, and live program data.</p>
    <button type="button" onclick="window.location.reload()">Try again</button>
  </main>
</body>
</html>
