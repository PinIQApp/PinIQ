services:
  - type: web
    name: wrestletech-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health/live
    envVars:
      - key: ENVIRONMENT
        value: staging
      - key: APP_NAME
        value: WrestleTech API
      - key: API_V1_STR
        value: /api/v1
      - key: SECRET_KEY
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: REFRESH_TOKEN_EXPIRE_MINUTES
        value: "43200"
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_ORIGIN
        value: https://wrestletech-beta-1kpr.onrender.com
      - key: CORS_ORIGINS
        value: https://wrestletech-beta-1kpr.onrender.com
      - key: AUTO_CREATE_SCHEMA
        value: "false"
      - key: SEED_DEMO_DATA_ON_STARTUP
        value: "true"
      - key: MEDIA_DIR
        value: media
      - key: STORAGE_PROVIDER
        value: local
      - key: MEDIA_BASE_URL
        value: /media
      - key: PAYMENT_PROVIDER
        value: mock
      - key: SMS_PROVIDER
        value: mock
      - key: EMAIL_PROVIDER
        value: mock
      - key: PUSH_PROVIDER
        value: mock
      - key: NUTRITION_PROVIDER
        value: mock
      - key: ENABLE_STRICT_WRESTLER_SAFETY
        value: "true"

  - type: web
    name: wrestletech-beta
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile.web
    plan: free
    healthCheckPath: /health

  - type: cron
    name: wrestletech-recruiting-source-scan
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: python scripts/run_recruiting_source_scan.py --limit 500 --show-failures
    schedule: "0 7 * * *"
    plan: starter
    envVars:
      - key: ENVIRONMENT
        value: staging
      - key: APP_NAME
        value: WrestleTech Recruiting Scanner
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: AUTO_CREATE_SCHEMA
        value: "false"
      - key: SEED_DEMO_DATA_ON_STARTUP
        value: "false"
      - key: MEDIA_DIR
        value: media
      - key: STORAGE_PROVIDER
        value: local
      - key: PAYMENT_PROVIDER
        value: mock
      - key: SMS_PROVIDER
        value: mock
      - key: EMAIL_PROVIDER
        value: mock
      - key: PUSH_PROVIDER
        value: mock
      - key: NUTRITION_PROVIDER
        value: mock
      - key: ENABLE_STRICT_WRESTLER_SAFETY
        value: "true"
